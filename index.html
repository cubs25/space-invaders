<body>

  <!-- Botones táctiles FUERA del #game para que el scale no los afecte -->
  <div id="touch-controls">
    <div class="btn-group-left">
      <button id="touch-left"  class="touch-btn"><i class="fa-solid fa-arrow-left"></i></button>
      <button id="touch-right" class="touch-btn"><i class="fa-solid fa-arrow-right"></i></button>
    </div>
    <button id="touch-fire" class="touch-btn touch-fire"><i class="fa-solid fa-circle-dot"></i><span>FIRE</span></button>
  </div>

  <button id="btn-toggle-bar"><i class="fa-solid fa-bars"></i></button>

  <div id="game">

    <div id="watermark">
      <svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
        <path d="M450,9.4L68.5,229.7v440.6L450,890.6l381.5-220.3V229.7L450,9.4z M450,820.1L129.5,635.1V264.9L450,79.9
          l320.5,185.1v128.2c-13.4-10.2-40.6-28-58.9-19.9c0,0,21.7,31.2,0,46.1c0,0-134.1,38.3-198,86c15.8-20.7,51.1-41.4,51.1-41.4
          s-206-196.8-384.4-209.5c0,0,88.5,83.8,114.2,113.7c2,2.3-0.4,4.9-2,7.8c0,0,22,2.7,36.6,10.1l-14.2,10.5
          c0,0,70.6,101.8,121.6,156.4c0,0,5.3,100.4-49.8,220c0,0,100.4-27.9,185.2-216.7c13.4-5.1,55.6-6.7,100.5-6.8
          c-0.6,0.1-1,0.2-1,0.2c15.3,1.9-2.6,5.5-2.6,5.5c-8.6,0-2.3,4.6-2.3,4.6s17.6,13.6,26.2,24.7c0,0,3.7,4.6,4.4,10.6
          c0,0,33-9.9,41.5-42.6c0.2-0.8,4.4-1.4,5.6-2.3c9.9,0.2,18.7,0.4,26.4,0.7v84.1L450,820.1z" />
      </svg>
    </div>

    <div id="hud">
      <span>SCORE: <strong id="score">0</strong></span>
      <span>NIVEL: <strong id="level">1</strong></span>
      <span>PLAYER: <strong id="player-name">---</strong></span>
      <span>VIDAS: <strong id="lives"></strong></span>
    </div>


    <div id="top-bar-collapsible">
      <div id="music-player">
        <button class="mp-btn" onclick="prevTrack()"><i class="fa-solid fa-backward-step"></i></button>
        <button class="mp-btn" onclick="playBG()"><i class="fa-solid fa-play"></i></button>
        <button class="mp-btn" onclick="pauseBG()"><i class="fa-solid fa-pause"></i></button>
        <button class="mp-btn" onclick="nextTrack()"><i class="fa-solid fa-forward-step"></i></button>
        <span id="track-label">Darude — Sandstorm</span>
        <button class="mp-btn vol-btn" onclick="setBGVolume(bgAudio.volume - 0.1)"><i class="fa-solid fa-chevron-down"></i></button>
        <input type="range" id="vol-slider" min="0" max="100" value="40" oninput="setBGVolume(this.value/100)" />
        <button class="mp-btn vol-btn" onclick="setBGVolume(bgAudio.volume + 0.1)"><i class="fa-solid fa-chevron-up"></i></button>
      </div>
      <div id="controls-bar">
        <button id="btn-pause-big" onclick="togglePause()"><i class="fa-solid fa-pause"></i> PAUSA</button>
        <button id="btn-lb" onclick="showLeaderboard()"><i class="fa-solid fa-trophy" style="color:#ad7d4b"></i> TOP 50</button>
        <button id="btn-mute" onclick="toggleMute()"><i class="fa-solid fa-volume-high"></i> SONIDO</button>
      </div>
    </div>

    <div id="board">
      <div id="player"></div>
      <div id="pause-overlay" class="screen hidden">
        <h1 style="color:#c28a3e">PAUSA</h1>
        <p id="pause-player" style="font-size:24px;color:#ad7d4b;letter-spacing:4px;margin-top:8px;"></p>
        <p id="pause-score" style="font-size:28px;color:#FFD700;letter-spacing:3px;"></p>
        <button onclick="togglePause()" id="btn-start" style="margin-top:12px;">CONTINUAR</button>
      </div>
    </div>

    <div id="score-watermark"><span id="score-bg">0</span></div>

    <div id="bottom-bar">
      <span>SCORE: <strong id="bottom-score">0</strong></span>
      <span>RECORD: <span id="record-display"></span></span>
    </div>

    <!-- Pantalla inicio -->
    <div id="screen-start" class="screen">
      <div style="max-width:300px;width:100%;margin:0 auto;">
        <img src="assets/og-image.png" alt="Space25" style="width:100%;height:auto;display:block;">
      </div>
      <p style="font-size:18px;color:#888;letter-spacing:2px;">TUS INICIALES</p>
      <input id="initials-input-start" maxlength="6"
        style="font-family:'VT323',monospace;font-size:48px;width:200px;text-align:center;background:#0a0a2a;border:2px solid #c28a3e;color:#fff;letter-spacing:6px;margin:8px 0;"
        onkeydown="if(event.key==='Enter')setInitials()" />
      <button onclick="setInitials()" id="btn-start">PRESS START</button>
      <button onclick="showLeaderboard()"
        style="font-family:'VT323',monospace;font-size:20px;letter-spacing:2px;color:#ede0cc;background:#4a7060;border:2px solid #c28a3e;padding:8px 24px;cursor:pointer;margin-top:0;">
        <i class="fa-solid fa-trophy" style="color:#ad7d4b"></i> VER TABLA
      </button>
      <h1>SPACE25</h1>
      <div style="font-size:16px;color:#555;letter-spacing:2px;margin-top:4px;display:flex;gap:16px;align-items:center;">
        <span><i class="fa-solid fa-arrow-left"></i> <i class="fa-solid fa-arrow-right"></i> &nbsp;MOVER</span>
        <span style="color:#333;">|</span>
        <span style="color:#c28a3e;">&#9251; SPACE &nbsp;FIRE</span>
        <span style="color:#333;">|</span>
        <span>P &nbsp;PAUSA</span>
      </div>
    </div>

    <!-- Pantalla game over -->
    <div id="screen-gameover" class="screen hidden">
      <h1>GAME OVER</h1>
      <p id="go-score"></p>
      <button onclick="startGame()" id="btn-start" style="margin-top:12px;">VOLVER A JUGAR</button>
      <p style="font-size:16px;color:#555;letter-spacing:2px;margin-top:8px;">o presiona ENTER</p>
    </div>

  </div>

  <script src="js/main.js"></script>
